<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码调试</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div id="app" style="padding:20px; font-family:monospace; white-space:pre-wrap;"></div>

<script>
    (async function() {
        const app = document.getElementById('app');
        
        // 配置
        const SUPABASE_URL = 'https://tdhbzdnaieqcqzmbctlx.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkaGJ6ZG5haWVxY3F6bWJjdGx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTY4NDEsImV4cCI6MjA5Njc5Mjg0MX0.QSYPR37gOWNJkGIOEMwKsSa6mPkSFa5bXU_JSfxLWSM';
        
        app.innerHTML = '1. 初始化 Supabase...\n';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        app.innerHTML += '2. 获取URL参数...\n';
        const urlParams = new URLSearchParams(window.location.search);
        const tagId = urlParams.get('id');
        
        app.innerHTML += '3. 参数值: ' + (tagId || '无') + '\n';
        
        if (!tagId) {
            app.innerHTML += '❌ 没有id参数';
            return;
        }
        
        app.innerHTML += '4. 开始查询数据库...\n';
        
        try {
            const { data, error } = await supabase
                .from('tag_records')
                .select('*')
                .eq('tag_id', tagId);
            
            app.innerHTML += '5. 查询完成\n';
            app.innerHTML += 'error: ' + JSON.stringify(error, null, 2) + '\n';
            app.innerHTML += 'data: ' + JSON.stringify(data, null, 2) + '\n';
            
            if (error) {
                app.innerHTML += '❌ 查询错误: ' + error.message;
                return;
            }
            
            if (!data || data.length === 0) {
                app.innerHTML += '❌ 未找到产品';
                return;
            }
            
            app.innerHTML += '✅ 找到产品: ' + data[0].spec;
            
        } catch (err) {
            app.innerHTML += '❌ 异常: ' + err.message;
        }
    })();
</script>
</body>
</html>
