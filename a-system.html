<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>纺织生产端管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9f0f5; font-family: 'Segoe UI', 'SimSun', sans-serif; padding: 16px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 28px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .header { background: white; padding: 14px 20px; border-bottom: 1px solid #e2e9f0; }
        .header h1 { font-size: 1.3rem; color: #1f6e8c; }
        .header p { font-size: 0.7rem; color: #5e7e97; }
        .summary-cards { display: flex; gap: 15px; flex-wrap: wrap; padding: 15px 20px; background: #f8fafc; border-bottom: 1px solid #e2edf5; }
        .summary-card { background: white; padding: 12px 24px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.04); flex: 1; min-width: 120px; text-align: center; }
        .summary-card .num { font-size: 28px; font-weight: bold; color: #1f6e8c; }
        .summary-card .label { font-size: 12px; color: #888; margin-top: 4px; }
        .summary-card.in .num { color: #2e7d32; }
        .summary-card.out .num { color: #c62828; }
        .summary-card.stock .num { color: #1f6e8c; }
        .summary-card.pending .num { color: #e65100; }
        .tab-bar { display: flex; border-bottom: 2px solid #e2edf5; overflow-x: auto; background: white; }
        .tab { padding: 12px 20px; cursor: pointer; font-weight: 600; color: #5e7e97; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab.active { color: #1f6e8c; border-bottom-color: #1f6e8c; }
        .sub-tab-bar { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #e2edf5; padding-bottom: 8px; flex-wrap: wrap; }
        .sub-tab { padding: 6px 16px; cursor: pointer; font-weight: 600; color: #5e7e97; border-radius: 20px; font-size: 0.85rem; }
        .sub-tab.active { background: #1f6e8c; color: white; }
        .main-content { padding: 20px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 5px; font-size: 13px; }
        .form-group input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn { background: #1f6e8c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-success { background: #2e7d32; }
        .btn-danger { background: #c62828; }
        .btn-sm { padding: 4px 10px; font-size: 12px; }
        .btn-warning { background: #e65100; }
        .btn-outline { background: transparent; color: #666; border: 1px solid #ccc; }
        .btn-outline:hover { background: #f5f5f5; }
        .net-weight-display { background: #e8f5e9; padding: 8px 12px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; }
        .table-wrapper { overflow-x: auto; margin-top: 15px; border: 1px solid #e2edf5; border-radius: 12px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .data-table th, .data-table td { border: 1px solid #e2edf5; padding: 10px 8px; text-align: left; }
        .data-table th { background: #eef3fc; white-space: nowrap; }
        .data-table td { word-break: break-word; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; align-items: center; }
        .search-bar input { padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; flex: 1; min-width: 150px; }
        .stock-item { background: #f8f9fa; padding: 12px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .pending-summary { background: #fff3e0; padding: 12px 16px; border-radius: 12px; margin-bottom: 16px; display: flex; flex-wrap: wrap; gap: 20px; border-left: 4px solid #ff9800; }
        .pending-summary-item { font-size: 14px; }
        .pending-summary-item strong { color: #e65100; }
        .batch-bar { margin: 15px 0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .repair-area { margin-top: 20px; padding: 16px; background: #f5f5f5; border-radius: 12px; border: 1px dashed #aaa; }
        .repair-title { font-weight: bold; margin-bottom: 12px; color: #1f6e8c; }
        .danger-area { margin-top: 20px; padding: 16px; background: #fff5f5; border-radius: 12px; border: 2px solid #c62828; }
        .danger-area .repair-title { color: #c62828; }
        .flex-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .select-all-btn { background: #1565c0; color: white; border: none; padding: 6px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .select-all-btn:hover { background: #0d47a1; }
        .password-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .password-modal .modal-box { background: white; padding: 30px; border-radius: 16px; max-width: 380px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .password-modal .modal-box h3 { margin-bottom: 16px; color: #c62828; }
        .password-modal .modal-box input { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 16px; }
        .password-modal .modal-box .btn-row { display: flex; gap: 10px; justify-content: flex-end; }
        .password-modal .modal-box .btn-row button { padding: 10px 24px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 30px; z-index: 2000; animation: fadeOut 2.5s ease; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .print-iframe { position: absolute; width: 0; height: 0; border: none; visibility: hidden; }
        @media (max-width: 600px) {
            .summary-cards { gap: 8px; padding: 10px; }
            .summary-card { padding: 8px 12px; min-width: 80px; }
            .summary-card .num { font-size: 20px; }
            .main-content { padding: 12px; }
            .tab { padding: 8px 12px; font-size: 13px; }
        }
        input { autocomplete: off; autocorrect: off; autocapitalize: off; spellcheck: false; }
    </style>
</head>

    function showToast(msg) {
        let div = document.createElement('div');

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function generateTagId() {
        let now = new Date();
        let ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') +
                 String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
        let random = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
        return 'TAG' + ts + random;
    }

    function exportToCSV(data, filename, columns) {
        if (!data || data.length === 0) { showToast('没有数据可导出'); return; }
        let csvRows = [columns.map(c => c.title).join(',')];
        for (let row of data) {
            let values = columns.map(col => {
                let val = row[col.key] !== undefined && row[col.key] !== null ? row[col.key] : '';
                if (typeof val === 'string' && (val.includes(',') || val.includes('"') || val.includes('\n'))) {
                    val = `"${val.replace(/"/g, '""')}"`;
                }
                return val;
            });
            csvRows.push(values.join(','));
        }
        let blob = new Blob(['\uFEFF' + csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
        let link = document.createElement('a');
        let url = URL.createObjectURL(blob);
        link.href = url;
        link.setAttribute('download', filename);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast('✅ 导出成功');
    }

    async function updateStock(spec, color, batch, deltaQty, deltaNet) {
        const { data: stock } = await supabase.from('stock_records')
            .select('*')
            .eq('spec', spec)
            .eq('color_no', color || '')
            .eq('batch_no', batch || '');
        
        if (stock && stock.length > 0) {
            const newQty = (stock[0].quantity || 0) + deltaQty;
            const newNet = (stock[0].net_weight || 0) + deltaNet;
            if (newQty <= 0 && newNet <= 0) {
                await supabase.from('stock_records').delete().eq('id', stock[0].id);
            } else {
                await supabase.from('stock_records').update({ quantity: newQty, net_weight: newNet }).eq('id', stock[0].id);
            }
        } else if (deltaQty > 0 || deltaNet > 0) {
            await supabase.from('stock_records').insert({ spec, color_no: color || '', batch_no: batch || '', quantity: Math.max(0, deltaQty), net_weight: Math.max(0, deltaNet) });
        }
    }
    
    async function cancelPending(tagId) {
        if (!confirm(`确定取消待出库 ${tagId} 吗？`)) return;
        const { data: tag } = await supabase.from('tag_records').select('*').eq('tag_id', tagId).single();
        if (!tag) { showToast('记录不存在'); return; }
        if (tag.status !== '待出库') { showToast('该记录不是待出库状态'); return; }
        await supabase.from('tag_records').update({ status: '已入库', pending_time: null }).eq('tag_id', tagId);
        showToast('✅ 已取消待出库');
        loadPendingList();
        loadSummary();
    }
    
    async function deleteInRecord(uniqueId) {
        if (!confirm('确定删除此入仓记录吗？将同步删除标签并回滚库存！')) return;
        const { data: tag } = await supabase.from('tag_records').select('*').eq('tag_id', uniqueId).single();
        if (!tag) { showToast('记录不存在'); return; }
        if (tag.status !== '已入库') { showToast('只能删除已入库状态的记录'); return; }
        await supabase.from('in_records').delete().eq('unique_id', uniqueId);
        await supabase.from('tag_records').delete().eq('tag_id', uniqueId);
        await updateStock(tag.spec, tag.color, tag.batch, -tag.qty, -tag.net);
        showToast('✅ 已删除并回滚库存');
        loadInRecords();
        loadStock();
        loadSummary();
    }
    
    async function batchDeleteInRecords() {
        const cbs = document.querySelectorAll('.in-cb:checked');
        if (cbs.length === 0) { showToast('请勾选要删除的入仓记录'); return; }
        if (!confirm(`确定批量删除 ${cbs.length} 条入仓记录吗？将同步删除标签并回滚库存！`)) return;
        let success = 0;
        for (const cb of cbs) {
            const tagId = cb.getAttribute('data-id');
            const { data: tag } = await supabase.from('tag_records').select('*').eq('tag_id', tagId).single();
            if (tag && tag.status === '已入库') {
                await supabase.from('in_records').delete().eq('unique_id', tagId);
                await supabase.from('tag_records').delete().eq('tag_id', tagId);
                await updateStock(tag.spec, tag.color, tag.batch, -tag.qty, -tag.net);
                success++;
            }
        }
        showToast(`✅ 批量删除完成！成功: ${success}`);
        loadInRecords();
        loadStock();
        loadSummary();
    }
    
    async function clearAllData() {
        showPasswordModal(async () => {
            if (!confirm('⚠️ 确定清空所有数据吗？包括入仓、出仓、库存、标签记录！此操作不可恢复！')) return;
            if (!confirm('再次确认：清空所有数据？')) return;
            try {
                await supabase.from('tag_records').delete().neq('tag_id', '');
                await supabase.from('in_records').delete().neq('unique_id', '');
                await supabase.from('out_records').delete().neq('unique_id', '');
                await supabase.from('stock_records').delete().neq('id', 0);
                showToast('✅ 所有数据已清空');
                loadInRecords();
                loadOutRecords();
                loadStock();
                loadSummary();
                loadPendingList();
            } catch(e) {
                showToast('清空失败: ' + e.message);
            }
        });
    }
    
    async function reprintTag(tagId) {
        const { data: tag } = await supabase.from('tag_records').select('*').eq('tag_id', tagId).single();
        if (!tag) { showToast('未找到标签记录'); return false; }
        await printLabel(tagId, {
            spec: tag.spec, color: tag.color, machine: tag.machine,
            qty: tag.qty, gross: tag.gross, tong: tag.tong, box: tag.box,
            net: tag.net, handler: tag.handler, batch: tag.batch
        });
        showToast(`🖨️ 补打标签: ${tagId}`);
        return true;
    }
    
    async function loadSummary() {
        try {
            const today = new Date().toISOString().slice(0,10);
            const { data: inData } = await supabase.from('in_records').select('*').gte('created_at', today);
            const inCount = inData ? inData.length : 0;
            const { data: outData } = await supabase.from('out_records').select('*').gte('created_at', today);
            const outCount = outData ? outData.length : 0;
            const { data: stockData } = await supabase.from('stock_records').select('*');
            let stockQty = 0;
            if (stockData) for (let s of stockData) stockQty += (s.quantity || 0);
            const { data: pendingData } = await supabase.from('tag_records').select('*').eq('status', '待出库');
            const pendingCount = pendingData ? pendingData.length : 0;
            document.getElementById('summaryIn').textContent = inCount;
            document.getElementById('summaryOut').textContent = outCount;
            document.getElementById('summaryStock').textContent = stockQty;
            document.getElementById('summaryPending').textContent = pendingCount;
        } catch(e) {}
    }
    
    async function loadPendingList() {
        const { data } = await supabase.from('tag_records').select('*').eq('status', '待出库').order('pending_time');
        const tbody = document.getElementById('pendingTableBody');
        const summaryMap = new Map();
        for (let item of (data || [])) {
            const key = `${item.spec}|${item.batch || ''}`;
            if (!summaryMap.has(key)) summaryMap.set(key, { spec: item.spec, batch: item.batch || '-', qty: 0, net: 0 });
            let sum = summaryMap.get(key);
            sum.qty += item.qty;
            sum.net += item.net;
        }
        const summaryArray = Array.from(summaryMap.values());
        const summaryDiv = document.getElementById('pendingSummary');
        if (summaryDiv) {
            if (summaryArray.length === 0) {
                summaryDiv.innerHTML = '<span>暂无待出库产品</span>';
            } else {
                summaryDiv.innerHTML = summaryArray.map(s => `
                    <div class="pending-summary-item">
                        📦 <strong>${escapeHtml(s.spec)}</strong>
                        批号: ${escapeHtml(s.batch)}
                        共 <strong>${s.qty}</strong> 个
                        净重 <strong>${s.net.toFixed(2)}</strong> kg
                    </div>
                `).join('');
            }
        }
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center">暂无待出库记录</td></tr>';
            document.getElementById('pendingCount').textContent = '0';
            return;
        }
        document.getElementById('pendingCount').textContent = data.length;
        tbody.innerHTML = data.map(item => `
            <tr>
                <td><input type="checkbox" class="pending-cb" data-id="${escapeHtml(item.tag_id)}"></td>
                <td>${escapeHtml(item.tag_id)}</td>
                <td>${escapeHtml(item.spec)}</td>
                <td>${escapeHtml(item.color || '-')}</td>
                <td>${item.net} kg</td>
                <td>${escapeHtml(item.handler || '-')}</td>
                <td>${item.pending_time ? new Date(item.pending_time).toLocaleString() : '-'}</td>
                <td><button class="btn btn-sm btn-warning" onclick="window.cancelPendingFromGlobal('${escapeHtml(item.tag_id)}')">取消</button></td>
            </tr>
        `).join('');
    }
    
    async function loadStock() {
        const { data } = await supabase.from('stock_records').select('*').order('spec');
        const search = document.getElementById('stockSearch')?.value.toLowerCase() || '';
        const filtered = (data || []).filter(i => 
            i.spec.toLowerCase().includes(search) || 
            (i.color_no || '').toLowerCase().includes(search) || 
            (i.batch_no || '').toLowerCase().includes(search)
        );
        const container = document.getElementById('stockList');
        if (!filtered.length) { container.innerHTML = '<p>暂无库存</p>'; return; }
        container.innerHTML = filtered.map(i => `
            <div class="stock-item">
                <div><strong>${escapeHtml(i.spec)}</strong> ${i.color_no ? '| 色号:' + escapeHtml(i.color_no) : ''} ${i.batch_no ? '| 批号:' + escapeHtml(i.batch_no) : ''}</div>
                <div>数量: ${i.quantity} | 净重: ${(i.net_weight||0).toFixed(2)}kg</div>
            </div>
        `).join('');
    }
    
    async function loadInRecords() {
        const { data } = await supabase.from('in_records').select('*').order('created_at', { ascending: false });
        const tbody = document.getElementById('inTableBody');
        if (!data || data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="10" style="text-align:center">暂无入仓记录</td></tr>';
            return;
        }
        tbody.innerHTML = data.map(r => `
            <tr>
                <td><input type="checkbox" class="in-cb" data-id="${escapeHtml(r.unique_id)}"></td>
                <td>${escapeHtml(r.unique_id||'-')}</td>
                <td>${escapeHtml(r.spec||'-')}</td>
                <td>${escapeHtml(r.color_no||'-')}</td>
                <td>${escapeHtml(r.machine_no||'-')}</td>
                <td>${r.quantity||'-'}</td>
                <td>${r.net_weight?r.net_weight+'kg':'-'}</td>
                <td>${escapeHtml(r.batch_no||'-')}</td>
                <td>${r.in_date||'-'}</td>
                <td>
                    <button class="btn btn-sm" onclick="window.reprintTagFromGlobal('${escapeHtml(r.unique_id)}')">🖨️ 补打</button>
                    <button class="btn btn-sm btn-danger" onclick="window.deleteInRecordFromGlobal('${escapeHtml(r.unique_id)}')">🗑️</button>
                </td>
            </tr>
        `).join('');
    }
    
    async function loadOutRecords() {
        const { data } = await supabase.from('out_records').select('*').order('created_at', { ascending: false });
        outDataCache = data || [];
        const tbody = document.getElementById('outTableBody');
        const search = document.getElementById('outSearch')?.value.toLowerCase() || '';
        let filtered = outDataCache;
        if (search) {
            filtered = outDataCache.filter(r => 
                (r.spec || '').toLowerCase().includes(search) ||
                (r.color_no || '').toLowerCase().includes(search) ||
                (r.batch_no || '').toLowerCase().includes(search) ||
                (r.unique_id || '').toLowerCase().includes(search)
            );
        }
        if (!filtered.length) {
            tbody.innerHTML = '<tr><td colspan="9" style="text-align:center">暂无出库记录</td></tr>';
            return;
        }
        tbody.innerHTML = filtered.map(r => `
            <tr>
                <td><input type="checkbox" class="out-cb" data-id="${escapeHtml(r.unique_id)}"></td>
                <td>${escapeHtml(r.unique_id||'-')}</td>
                <td>${escapeHtml(r.spec||'-')}</td>
                <td>${escapeHtml(r.color_no||'-')}</td>
                <td>${escapeHtml(r.machine_no||'-')}</td>
                <td>${r.quantity||'-'}</td>
                <td>${r.net_weight?r.net_weight+'kg':'-'}</td>
                <td>${escapeHtml(r.batch_no||'-')}</td>
                <td>${r.out_date||'-'}</td>
            </tr>
        `).join('');
    }

    function bindEvents() {
        if (currentTab === 'scan') {
            setTimeout(() => {
                const input = document.getElementById('scanInput');
                if (input) input.focus();
            }, 300);
        }
        
        function calcNet() {
            let gross = parseFloat(document.getElementById('gross')?.value) || 0;
            let tong = parseFloat(document.getElementById('tong')?.value) || 0;
            let box = parseFloat(document.getElementById('box')?.value) || 0;
            let net = Math.max(0, gross - tong - box);
            if (document.getElementById('netDisplay')) document.getElementById('netDisplay').innerText = net.toFixed(2);
            return net;
        }
        
        const grossInput = document.getElementById('gross');
        if (grossInput) {
            grossInput.addEventListener('input', calcNet);
            document.getElementById('tong')?.addEventListener('input', calcNet);
            document.getElementById('box')?.addEventListener('input', calcNet);
            calcNet();
        }
        
        document.getElementById('printBtn')?.addEventListener('click', async () => {
            const spec = document.getElementById('spec').value.trim();
            const color = document.getElementById('color').value.trim();
            const machine = document.getElementById('machine').value.trim();
            const qty = parseFloat(document.getElementById('qty').value);
            const gross = parseFloat(document.getElementById('gross').value);
            const tong = parseFloat(document.getElementById('tong').value) || 0;
            const box = parseFloat(document.getElementById('box').value) || 0;
            const handler = document.getElementById('handler').value.trim();
            const batch = document.getElementById('batch').value.trim();
            
            if (!spec || !machine || !qty || !gross || !handler) {
                showToast('请填写所有带*的字段');
                return;
            }
            const net = gross - tong - box;
            if (net <= 0) { showToast('净重计算错误'); return; }
            
            const tagId = generateTagId();
            const date = new Date().toISOString().slice(0,10);
            const printDate = new Date().toLocaleString();
            
            const { error: tagError } = await supabase.from('tag_records').insert({ 
                tag_id: tagId, spec, color, machine, qty, gross, tong, box, net, 
                handler, batch, date, status: '已入库', created_at: new Date().toISOString() 
            });
            if (tagError) { showToast('保存失败: ' + tagError.message); return; }
            
            await supabase.from('in_records').insert({ 
                unique_id: tagId, spec, color_no: color, machine_no: machine, quantity: qty, 
                gross_weight: gross, tube_weight: tong, box_weight: box, 
                package_type: handler, batch_no: batch, net_weight: net, in_date: printDate 
            });
            
            await updateStock(spec, color, batch, qty, net);
            await printLabel(tagId, { spec, color, machine, qty, gross, tong, box, net, handler, batch });
            
            showToast('✅ 打印成功！标签ID: ' + tagId);
            document.getElementById('gross').value = '';
            calcNet();
            
            loadStock();
            loadInRecords();
            loadOutRecords();
            loadSummary();
        });
        
        document.getElementById('searchAndReprintBtn')?.addEventListener('click', async () => {
            const tagId = document.getElementById('repairTagId').value.trim();
            if (!tagId) { showToast('请输入标签ID'); return; }
            await reprintTag(tagId);
            document.getElementById('repairTagId').value = '';
        });
        
        document.getElementById('repairTagId')?.addEventListener('keypress', async (e) => {
            if (e.key === 'Enter') {
                const tagId = e.target.value.trim();
                if (tagId) await reprintTag(tagId);
                e.target.value = '';
            }
        });
        
        const pcConfirmBtn = document.getElementById('pcConfirmBtn');
        const scanInput = document.getElementById('scanInput');
        if (pcConfirmBtn && scanInput) {
            pcConfirmBtn.onclick = async () => {
                let tagId = scanInput.value.trim();
                if (!tagId) { showToast('请扫描二维码'); return; }
                tagId = tagId.split('\n')[0];
                const { data: tag } = await supabase.from('tag_records').select('*').eq('tag_id', tagId).single();
                if (!tag) { showToast('未找到产品'); return; }
                if (tag.status !== '已入库') { showToast('该产品已在待出库或已出库'); return; }
                await supabase.from('tag_records').update({ status: '待出库', pending_time: new Date().toISOString() }).eq('tag_id', tagId);
                showToast('✅ 已转为待出库');
                scanInput.value = '';
                scanInput.focus();
                loadPendingList();
                loadSummary();
            };
            
            scanInput.addEventListener('input', function() {
                clearTimeout(scanTimer);
                const val = this.value.trim();
                if (val && val.startsWith('TAG')) {
                    scanTimer = setTimeout(() => {
                        pcConfirmBtn.click();
                    }, 300);
                }
            });
            
            scanInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    pcConfirmBtn.click();
                }
            });
        }
        
        document.getElementById('batchOutBtn')?.addEventListener('click', async () => {
            const cbs = document.querySelectorAll('.pending-cb:checked');
            if (cbs.length === 0) { showToast('请勾选要出库的产品'); return; }
            if (!confirm(`确认出库 ${cbs.length} 个产品吗？`)) return;
            let success = 0;
            for (const cb of cbs) {
                const tagId = cb.getAttribute('data-id');
                const { data: tag } = await supabase.from('tag_records').select('*').eq('tag_id', tagId).single();
                if (tag && tag.status === '待出库') {
                    await supabase.from('tag_records').update({ status: '已出库', out_time: new Date().toISOString() }).eq('tag_id', tagId);
                    await supabase.from('out_records').insert({
                        unique_id: tagId, spec: tag.spec, color_no: tag.color, machine_no: tag.machine,
                        quantity: tag.qty, net_weight: tag.net, batch_no: tag.batch, out_date: new Date().toLocaleString()
                    });
                    await updateStock(tag.spec, tag.color, tag.batch, -tag.qty, -tag.net);
                    success++;
                }
            }
            showToast(`✅ 批量出库完成！成功: ${success}`);
            loadPendingList();
            loadStock();
            loadOutRecords();
            loadSummary();
        });
        
        document.getElementById('selectAllPendingBtn')?.addEventListener('click', () => {
            document.querySelectorAll('.pending-cb').forEach(cb => cb.checked = true);
        });
        document.getElementById('deselectAllPendingBtn')?.addEventListener('click', () => {
            document.querySelectorAll('.pending-cb').forEach(cb => cb.checked = false);
        });
        document.getElementById('selectAllPending')?.addEventListener('change', function() {
            document.querySelectorAll('.pending-cb').forEach(cb => cb.checked = this.checked);
        });
        
        document.getElementById('selectAllInBtn')?.addEventListener('click', () => {
            document.querySelectorAll('.in-cb').forEach(cb => cb.checked = true);
        });
        document.getElementById('deselectAllInBtn')?.addEventListener('click', () => {
            document.querySelectorAll('.in-cb').forEach(cb => cb.checked = false);
        });
        document.getElementById('selectAllIn')?.addEventListener('change', function() {
            document.querySelectorAll('.in-cb').forEach(cb => cb.checked = this.checked);
        });
        document.getElementById('batchDeleteInBtn')?.addEventListener('click', batchDeleteInRecords);
        
        document.getElementById('selectAllOutBtn')?.addEventListener('click', () => {
            document.querySelectorAll('.out-cb').forEach(cb => cb.checked = true);
        });
        document.getElementById('deselectAllOutBtn')?.addEventListener('click', () => {
            document.querySelectorAll('.out-cb').forEach(cb => cb.checked = false);
        });
        document.getElementById('selectAllOut')?.addEventListener('change', function() {
            document.querySelectorAll('.out-cb').forEach(cb => cb.checked = this.checked);
        });
        
        document.getElementById('exportSelectedOutBtn')?.addEventListener('click', () => {
            const cbs = document.querySelectorAll('.out-cb:checked');
            if (cbs.length === 0) { showToast('请勾选要导出的记录'); return; }
            const ids = new Set();
            cbs.forEach(cb => ids.add(cb.getAttribute('data-id')));
            const selected = outDataCache.filter(r => ids.has(r.unique_id));
            if (!selected.length) { showToast('未找到选中数据'); return; }
            exportToCSV(selected, `出库记录_选中_${new Date().toISOString().slice(0,10)}.csv`, [
                { key: 'unique_id', title: '标签ID' }, { key: 'spec', title: '规格' },
                { key: 'color_no', title: '色号' }, { key: 'machine_no', title: '机号' },
                { key: 'quantity', title: '数量' }, { key: 'net_weight', title: '净重(kg)' },
                { key: 'batch_no', title: '批号' }, { key: 'out_date', title: '出库日期' }
            ]);
        });
        
        document.getElementById('exportAllOutBtn')?.addEventListener('click', () => {
            const search = document.getElementById('outSearch')?.value.toLowerCase() || '';
            let data = outDataCache;
            if (search) {
                data = data.filter(r => 
                    (r.spec || '').toLowerCase().includes(search) ||
                    (r.color_no || '').toLowerCase().includes(search) ||
                    (r.batch_no || '').toLowerCase().includes(search) ||
                    (r.unique_id || '').toLowerCase().includes(search)
                );
            }
            if (!data.length) { showToast('没有数据可导出'); return; }
            exportToCSV(data, `出库记录_全部_${new Date().toISOString().slice(0,10)}.csv`, [
                { key: 'unique_id', title: '标签ID' }, { key: 'spec', title: '规格' },
                { key: 'color_no', title: '色号' }, { key: 'machine_no', title: '机号' },
                { key: 'quantity', title: '数量' }, { key: 'net_weight', title: '净重(kg)' },
                { key: 'batch_no', title: '批号' }, { key: 'out_date', title: '出库日期' }
            ]);
        });
        
        document.getElementById('filterOutBtn')?.addEventListener('click', () => {
            const from = document.getElementById('outDateFrom').value;
            const to = document.getElementById('outDateTo').value;
            let filtered = outDataCache;
            if (from) filtered = filtered.filter(r => (r.created_at || '').slice(0,10) >= from);
            if (to) filtered = filtered.filter(r => (r.created_at || '').slice(0,10) <= to);
            const tbody = document.getElementById('outTableBody');
            if (!filtered.length) {
                tbody.innerHTML = '<tr><td colspan="9" style="text-align:center">无匹配记录</td></tr>';
                return;
            }
            tbody.innerHTML = filtered.map(r => `
                <tr>
                    <td><input type="checkbox" class="out-cb" data-id="${escapeHtml(r.unique_id)}"></td>
                    <td>${escapeHtml(r.unique_id||'-')}</td>
                    <td>${escapeHtml(r.spec||'-')}</td>
                    <td>${escapeHtml(r.color_no||'-')}</td>
                    <td>${escapeHtml(r.machine_no||'-')}</td>
                    <td>${r.quantity||'-'}</td>
                    <td>${r.net_weight?r.net_weight+'kg':'-'}</td>
                    <td>${escapeHtml(r.batch_no||'-')}</td>
                    <td>${r.out_date||'-'}</td>
                </tr>
            `).join('');
        });
        
        document.getElementById('clearOutFilterBtn')?.addEventListener('click', () => {
            document.getElementById('outDateFrom').value = '';
            document.getElementById('outDateTo').value = '';
            loadOutRecords();
        });
        
        document.getElementById('clearAllBtn')?.addEventListener('click', clearAllData);
        
        document.getElementById('searchInBtn')?.addEventListener('click', async () => {
            const kw = document.getElementById('inSearch').value.trim();
            if (!kw) { loadInRecords(); return; }
            const { data } = await supabase.from('in_records').select('*').or(`spec.ilike.%${kw}%,color_no.ilike.%${kw}%,batch_no.ilike.%${kw}%`);
            const tbody = document.getElementById('inTableBody');
            if (!data || !data.length) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center">未找到</td></tr>';
                return;
            }
            tbody.innerHTML = data.map(r => `
                <tr>
                    <td><input type="checkbox" class="in-cb" data-id="${escapeHtml(r.unique_id)}"></td>
                    <td>${escapeHtml(r.unique_id||'-')}</td>
                    <td>${escapeHtml(r.spec||'-')}</td>
                    <td>${escapeHtml(r.color_no||'-')}</td>
                    <td>${escapeHtml(r.machine_no||'-')}</td>
                    <td>${r.quantity||'-'}</td>
                    <td>${r.net_weight?r.net_weight+'kg':'-'}</td>
                    <td>${escapeHtml(r.batch_no||'-')}</td>
                    <td>${r.in_date||'-'}</td>
                    <td>
                        <button class="btn btn-sm" onclick="window.reprintTagFromGlobal('${escapeHtml(r.unique_id)}')">🖨️ 补打</button>
                        <button class="btn btn-sm btn-danger" onclick="window.deleteInRecordFromGlobal('${escapeHtml(r.unique_id)}')">🗑️</button>
                    </td>
                </tr>
            `).join('');
        });
        
        document.getElementById('refreshInBtn')?.addEventListener('click', loadInRecords);
        document.getElementById('searchOutBtn')?.addEventListener('click', loadOutRecords);
        document.getElementById('refreshOutBtn')?.addEventListener('click', loadOutRecords);
        document.getElementById('refreshStockBtn')?.addEventListener('click', loadStock);
        document.getElementById('stockSearch')?.addEventListener('input', loadStock);
        
        window.cancelPendingFromGlobal = cancelPending;
        window.reprintTagFromGlobal = async (tagId) => { await reprintTag(tagId); loadInRecords(); };
        window.deleteInRecordFromGlobal = async (tagId) => { await deleteInRecord(tagId); };
        
        document.querySelectorAll('.sub-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                currentSubTab = tab.dataset.subtab;
                render();
                if (currentSubTab === 'pending') loadPendingList();
            });
        });
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                currentTab = tab.dataset.tab;
                currentSubTab = 'current';
                render();
            });
        });
        
        loadStock();
        loadPendingList();
        loadInRecords();
        loadOutRecords();
        loadSummary();
    }
    
    render();
})();
</script>
</body>
</html>
