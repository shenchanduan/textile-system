<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>纺织生产端管理系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #e9f0f5; font-family: 'Segoe UI', 'SimSun', sans-serif; padding: 16px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 28px; overflow: hidden; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .header { background: white; padding: 14px 20px; border-bottom: 1px solid #e2e9f0; }
        .header h1 { font-size: 1.3rem; color: #1f6e8c; }
        .header p { font-size: 0.7rem; color: #5e7e97; }
        .tab-bar { display: flex; border-bottom: 2px solid #e2edf5; overflow-x: auto; }
        .tab { padding: 12px 20px; cursor: pointer; font-weight: 600; color: #5e7e97; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab.active { color: #1f6e8c; border-bottom-color: #1f6e8c; }
        .sub-tab-bar { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #e2edf5; padding-bottom: 8px; }
        .sub-tab { padding: 6px 16px; cursor: pointer; font-weight: 600; color: #5e7e97; border-radius: 20px; font-size: 0.85rem; }
        .sub-tab.active { background: #1f6e8c; color: white; }
        .main-content { padding: 20px; }
        .panel { display: none; }
        .panel.active { display: block; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-weight: bold; margin-bottom: 5px; font-size: 13px; }
        .form-group input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; }
        .btn { background: #1f6e8c; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-success { background: #2e7d32; }
        .btn-warning { background: #e67e22; }
        .net-weight-display { background: #e8f5e9; padding: 8px 12px; border-radius: 6px; font-weight: bold; margin-bottom: 15px; }
        .table-wrapper { overflow-x: auto; margin-top: 15px; border: 1px solid #e2edf5; border-radius: 12px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .data-table th, .data-table td { border: 1px solid #e2edf5; padding: 10px 8px; text-align: left; }
        .data-table th { background: #eef3fc; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-bar input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 20px; }
        .stock-item { background: #f8f9fa; padding: 12px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
        .label-print { width: 100mm; height: 100mm; background: white; border: 1px solid #000; padding: 3mm; position: relative; font-family: 'SimSun', '宋体', monospace; margin: 0 auto; }
        .label-print .company { text-align: center; font-size: 19pt; font-weight: bold; }
        .label-print .address { text-align: center; font-size: 11pt; line-height: 1.2; font-weight: bold; }
        .label-print .top-line { border-top: 0.5px solid #000; margin: 2mm 0; }
        .label-print .mid-line { border-top: 0.5px solid #000; margin: 4mm 0 2mm 0; }
        .label-print .two-col { display: flex; justify-content: space-between; margin: 2mm 0 0; }
        .label-print .left-col, .label-print .right-col { width: 45%; }
        .label-print .field { margin-bottom: 2mm; display: flex; align-items: baseline; }
        .label-print .field-name { width: 12mm; font-size: 13pt; font-weight: bold; }
        .label-print .field-value { font-size: 13pt; padding-left: 2mm; font-weight: bold; }
        .label-print .red .field-name, .label-print .red .field-value { color: #c00; }
        .label-print .date-row { display: flex; margin-top: 2mm; width: 100%; }
        .label-print .date-row .field-name { width: 12mm; font-size: 13pt; font-weight: bold; }
        .label-print .date-row .field-value { flex: 1; font-size: 13pt; font-weight: bold; }
        .label-print .footer { position: absolute; bottom: 8mm; left: 7mm; font-size: 16pt; font-weight: bold; color: #c00; line-height: 1.3; }
        .label-print .qr-area { position: absolute; bottom: 3mm; right: 12mm; text-align: center; }
        .label-print .qr-img { width: 24mm; height: 24mm; }
        @page { size: 100mm 100mm; margin: 0mm; }
        @media print { body * { visibility: hidden; } .print-area, .print-area * { visibility: visible; } .print-area { position: absolute; left: 0; top: 0; width: 100%; } }
        .toast-msg { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 30px; z-index: 2000; animation: fadeOut 2s ease; }
        @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
        .print-iframe { position: absolute; width: 0; height: 0; border: none; visibility: hidden; }
        .pending-checkbox { transform: scale(1.2); cursor: pointer; }
        .batch-bar { margin: 15px 0; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div id="app"></div>
<iframe id="printFrame" class="print-iframe"></iframe>

<script>
(function(){
    const SUPABASE_URL = 'https://tdhbzdnaieqcqzmbctlx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkaGJ6ZG5haWVxY3F6bWJjdGx4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEyMTY4NDEsImV4cCI6MjA5Njc5Mjg0MX0.QSYPR37gOWNJkGIOEMwKsSa6mPkSFa5bXU_JSfxLWSM';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let currentTab = 'print';
    let currentSubTab = 'current';
    
    function showToast(msg) {
        let div = document.createElement('div');
        div.className = 'toast-msg';
        div.innerText = msg;
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 2000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function generateTagId() {
        let now = new Date();
        let ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0') +
                 String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
        let random = String(Math.floor(Math.random() * 10000)).padStart(4, '0');
        return 'TAG' + ts + random;
    }
    
    function render() {
        document.getElementById('app').innerHTML = `
            <div class="container">
                <div class="header">
                    <h1>🏭 纺织生产端管理系统 <span style="font-size:0.7rem; background:#e8f5e9; padding:2px 8px; border-radius:20px;">A系统</span></h1>
                    <p>打印标签 | 库存管理 | 入仓记录 | 出仓记录</p>
                </div>
                <div class="tab-bar">
                    <div class="tab ${currentTab === 'print' ? 'active' : ''}" data-tab="print">🖨️ 打印标签</div>
                    <div class="tab ${currentTab === 'scan' ? 'active' : ''}" data-tab="scan">📷 扫码出库</div>
                    <div class="tab ${currentTab === 'stock' ? 'active' : ''}" data-tab="stock">📦 库存管理</div>
                    <div class="tab ${currentTab === 'in' ? 'active' : ''}" data-tab="in">📥 入仓记录</div>
                    <div class="tab ${currentTab === 'out' ? 'active' : ''}" data-tab="out">📤 出仓记录</div>
                </div>
                <div class="main-content">
                    <div id="printPanel" class="panel" style="display: ${currentTab === 'print' ? 'block' : 'none'}">
                        <div class="form-grid">
                            <div class="form-group"><label>规格 *</label><input type="text" id="spec" value="32S/2"></div>
                            <div class="form-group"><label>色号 <span style="font-weight:normal;color:#999;">(可选)</span></label><input type="text" id="color" value="深灰"></div>
                            <div class="form-group"><label>机号 *</label><input type="text" id="machine" value="8#"></div>
                            <div class="form-group"><label>数量 *</label><input type="number" id="qty" value="120"></div>
                            <div class="form-group"><label>毛重(kg) *</label><input type="number" step="0.01" id="gross" value="62.30"></div>
                            <div class="form-group"><label>筒重(kg) *</label><input type="number" step="0.01" id="tong" value="2.20"></div>
                            <div class="form-group"><label>箱重(kg) *</label><input type="number" step="0.01" id="box" value="3.10"></div>
                            <div class="form-group"><label>打包 *</label><input type="text" id="handler" value="李芳"></div>
                            <div class="form-group"><label>批号 <span style="font-weight:normal;color:#999;">(可选)</span></label><input type="text" id="batch" value="B20240601"></div>
                        </div>
                        <div class="net-weight-display">⚖️ 净重：<span id="netDisplay">0.00</span> kg (毛重-筒重-箱重)</div>
                        <button class="btn btn-success" id="printBtn">🖨️ 打印标签并入仓</button>
                        <div style="margin-top:15px; padding:12px; background:#f0f6fa; border-radius:12px;">
                            <p>📱 手机扫码：打印后扫描二维码，会打开确认出库页面</p>
                        </div>
                    </div>
                    
                    <div id="scanPanel" class="panel" style="display: ${currentTab === 'scan' ? 'block' : 'none'}">
                        <div class="form-group" style="max-width:400px">
                            <label>扫描二维码（扫码枪输入）</label>
                            <input type="text" id="scanInput" placeholder="扫描或输入标签ID..." style="padding:12px;font-size:16px">
                        </div>
                        <button class="btn btn-success" id="pcConfirmBtn" style="margin-top:15px;">✅ 转为待出库</button>
                        <div style="margin-top:20px; padding:12px; background:#f0f6fa; border-radius:12px;">
                            <p>📱 手机用户：用手机相机扫描标签上的二维码，会自动打开确认出库页面</p>
                        </div>
                    </div>
                    
                    <div id="stockPanel" class="panel" style="display: ${currentTab === 'stock' ? 'block' : 'none'}">
                        <div class="sub-tab-bar">
                            <div class="sub-tab ${currentSubTab === 'current' ? 'active' : ''}" data-subtab="current">📦 当前库存</div>
                            <div class="sub-tab ${currentSubTab === 'pending' ? 'active' : ''}" data-subtab="pending">⏳ 待出库列表</div>
                        </div>
                        <div id="currentStockPanel" style="display: ${currentSubTab === 'current' ? 'block' : 'none'}">
                            <div class="search-bar"><input type="text" id="stockSearch" placeholder="搜索规格/色号/机号..."><button class="btn" id="refreshStockBtn">刷新</button></div>
                            <div id="stockList"></div>
                        </div>
                        <div id="pendingStockPanel" style="display: ${currentSubTab === 'pending' ? 'block' : 'none'}">
                            <div class="batch-bar">
                                <button class="btn btn-success" id="batchOutBtn">📦 批量出库</button>
                                <span style="color:#666; font-size:13px;">勾选后点击批量出库，扣减库存并记录</span>
                            </div>
                            <div class="table-wrapper">
                                <table class="data-table">
                                    <thead>
                                        <tr><th style="width:40px"><input type="checkbox" id="selectAllPending"></th><th>标签ID</th><th>规格</th><th>色号</th><th>机号</th><th>净重(kg)</th><th>打包</th><th>扫码时间</th></tr>
                                    </thead>
                                    <tbody id="pendingTableBody"></tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    
                    <div id="inPanel" class="panel" style="display: ${currentTab === 'in' ? 'block' : 'none'}">
                        <div class="search-bar"><input type="text" id="inSearch" placeholder="搜索..."><button class="btn" id="searchInBtn">搜索</button><button class="btn" id="refreshInBtn">全部</button></div>
                        <div class="table-wrapper"><table class="data-table"><thead><tr><th>标签ID</th><th>规格</th><th>色号</th><th>机号</th><th>数量</th><th>净重</th><th>批号</th><th>日期</th></tr></thead><tbody id="inTableBody"></tbody></table></div>
                    </div>
                    
                    <div id="outPanel" class="panel" style="display: ${currentTab === 'out' ? 'block' : 'none'}">
                        <div class="search-bar"><input type="text" id="outSearch" placeholder="搜索..."><button class="btn" id="searchOutBtn">搜索</button><button class="btn" id="refreshOutBtn">全部</button></div>
                        <div class="table-wrapper"><table class="data-table"><thead><tr><th>标签ID</th><th>规格</th><th>色号</th><th>机号</th><th>数量</th><th>净重</th><th>批号</th><th>日期</th></tr></thead><tbody id="outTableBody"></tbody>｜｜DSML｜｜</div>
                    </div>
                </div>
            </div>
        `;
        bindEvents();
    }
    
    function bindEvents() {
        function calcNet() {
            let gross = parseFloat(document.getElementById('gross')?.value) || 0;
            let tong = parseFloat(document.getElementById('tong')?.value) || 0;
            let box = parseFloat(document.getElementById('box')?.value) || 0;
            let net = Math.max(0, gross - tong - box);
            if (document.getElementById('netDisplay')) document.getElementById('netDisplay').innerText = net.toFixed(2);
            return net;
        }
        
        const grossInput = document.getElementById('gross');
        if (grossInput) {
            grossInput.addEventListener('input', calcNet);
            document.getElementById('tong')?.addEventListener('input', calcNet);
            document.getElementById('box')?.addEventListener('input', calcNet);
            calcNet();
        }
        
        const printBtn = document.getElementById('printBtn');
        if (printBtn) {
            printBtn.onclick = async () => {
                const spec = document.getElementById('spec').value.trim();
                const color = document.getElementById('color').value.trim();
                const machine = document.getElementById('machine').value.trim();
                const qty = parseFloat(document.getElementById('qty').value);
                const gross = parseFloat(document.getElementById('gross').value);
                const tong = parseFloat(document.getElementById('tong').value) || 0;
                const box = parseFloat(document.getElementById('box').value) || 0;
                const handler = document.getElementById('handler').value.trim();
                const batch = document.getElementById('batch').value.trim();
                
                if (!spec || !machine || !qty || !gross || !handler) {
                    showToast('请填写所有带*的字段');
                    return;
                }
                
                const net = gross - tong - box;
                if (net <= 0) { showToast('净重计算错误'); return; }
                
                const tagId = generateTagId();
                const date = new Date().toISOString().slice(0,10);
                const printDate = new Date().toLocaleString();
                // 关键：二维码包含完整URL和参数
                const scanUrl = `https://shenchanduan.github.io/textile-system/scan.html?id=${encodeURIComponent(tagId)}`;
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=240x240&data=${encodeURIComponent(scanUrl)}`;
                
                const { error: tagError } = await supabase.from('tag_records').insert({ 
                    tag_id: tagId, spec, color, machine, qty, gross, tong, box, net, 
                    handler, batch, date, status: '已入库', created_at: new Date().toISOString() 
                });
                if (tagError) { showToast('保存失败: ' + tagError.message); return; }
                
                await supabase.from('in_records').insert({ 
                    unique_id: tagId, spec, color_no: color, machine_no: machine, quantity: qty, 
                    gross_weight: gross, tube_weight: tong, box_weight: box, 
                    package_type: handler, batch_no: batch, net_weight: net, in_date: printDate 
                });
                
                const { data: stockData } = await supabase.from('stock_records').select('*')
                    .eq('spec', spec).eq('color_no', color).eq('machine_no', machine).eq('batch_no', batch);
                if (stockData && stockData.length > 0) {
                    await supabase.from('stock_records').update({ 
                        quantity: stockData[0].quantity + qty, 
                        net_weight: (stockData[0].net_weight || 0) + net 
                    }).eq('id', stockData[0].id);
                } else {
                    await supabase.from('stock_records').insert({ 
                        spec, color_no: color, machine_no: machine, batch_no: batch, 
                        quantity: qty, net_weight: net 
                    });
                }
                
                const labelHtml = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>标签</title><style>
                    *{margin:0;padding:0;box-sizing:border-box}
                    body{background:white;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:'SimSun','宋体',monospace}
                    .label{width:100mm;height:100mm;border:1px solid #000;padding:3mm;position:relative;margin:0 auto}
                    .company{text-align:center;font-size:19pt;font-weight:bold}
                    .address{text-align:center;font-size:11pt;line-height:1.2;font-weight:bold}
                    .top-line{border-top:0.5px solid #000;margin:2mm 0}
                    .two-col{display:flex;justify-content:space-between;margin:2mm 0 0}
                    .left-col,.right-col{width:45%}
                    .field{margin-bottom:2mm;display:flex}
                    .field-name{width:12mm;font-size:13pt;font-weight:bold}
                    .field-value{font-size:13pt;padding-left:2mm;font-weight:bold}
                    .red .field-name,.red .field-value{color:#c00}
                    .date-row{display:flex;margin-top:2mm}
                    .date-row .field-name{width:12mm;font-size:13pt;font-weight:bold}
                    .date-row .field-value{font-size:13pt;font-weight:bold}
                    .footer{position:absolute;bottom:8mm;left:7mm;font-size:16pt;font-weight:bold;color:#c00}
                    .qr-area{position:absolute;bottom:3mm;right:12mm}
                    .qr-img{width:24mm;height:24mm}
                    @page{size:100mm 100mm;margin:0}
                    @media print{body{margin:0;padding:0}.label{border:none}}
                </style></head><body>
                <div class="label">
                    <div class="company">中山市淮鸿橡筋织带有限公司</div>
                    <div class="address">地址：中山市三角镇接民村金达路三号B栋五楼</div>
                    <div class="address">电话：13535238522</div>
                    <div class="top-line"></div>
                    <div class="two-col">
                        <div class="left-col">
                            <div class="field"><span class="field-name">规格</span><span class="field-value">${escapeHtml(spec)}</span></div>
                            <div class="field"><span class="field-name">机号</span><span class="field-value">${escapeHtml(machine)}</span></div>
                            <div class="field"><span class="field-name">毛重</span><span class="field-value">${gross.toFixed(2)}kg</span></div>
                            <div class="field"><span class="field-name">箱重</span><span class="field-value">${box.toFixed(2)}kg</span></div>
                            <div class="field red"><span class="field-name">净重</span><span class="field-value">${net.toFixed(2)}kg</span></div>
                        </div>
                        <div class="right-col">
                            <div class="field"><span class="field-name">色号</span><span class="field-value">${escapeHtml(color) || '-'}</span></div>
                            <div class="field"><span class="field-name">数量</span><span class="field-value">${qty}个</span></div>
                            <div class="field"><span class="field-name">筒重</span><span class="field-value">${tong.toFixed(2)}kg</span></div>
                            <div class="field"><span class="field-name">打包</span><span class="field-value">${escapeHtml(handler)}</span></div>
                            <div class="field"><span class="field-name">批号</span><span class="field-value">${escapeHtml(batch) || '-'}</span></div>
                        </div>
                    </div>
                    <div class="date-row"><span class="field-name">日期</span><span class="field-value">${date}</span></div>
                    <div class="footer">不同机号、批号<br>分开使用</div>
                    <div class="qr-area"><img class="qr-img" src="${qrUrl}"></div>
                </div>
                </body></html>`;
                
                const printFrame = document.getElementById('printFrame');
                printFrame.srcdoc = labelHtml;
                setTimeout(() => printFrame.contentWindow.print(), 100);
                
                showToast('✅ 打印成功！标签ID: ' + tagId);
                
                document.getElementById('spec').value = '';
                document.getElementById('machine').value = '';
                document.getElementById('qty').value = '';
                document.getElementById('gross').value = '';
                document.getElementById('tong').value = '0';
                document.getElementById('box').value = '0';
                document.getElementById('handler').value = '';
                document.getElementById('batch').value = '';
                calcNet();
                
                loadStock();
                loadInRecords();
                loadOutRecords();
            };
        }
        
        // PC端扫码转为待出库
        const pcConfirmBtn = document.getElementById('pcConfirmBtn');
        if (pcConfirmBtn) {
            pcConfirmBtn.onclick = async () => {
                let tagId = document.getElementById('scanInput').value.trim();
                if (!tagId) { showToast('请扫描二维码'); return; }
                tagId = tagId.split('\n')[0];
                const { data: tag } = await supabase.from('tag_records').select('*').eq('tag_id', tagId).single();
                if (!tag) { showToast('未找到产品'); return; }
                if (tag.status !== '已入库') { showToast('该产品已在待出库或已出库'); return; }
                await supabase.from('tag_records').update({ status: '待出库', pending_time: new Date().toISOString() }).eq('tag_id', tagId);
                showToast('✅ 已转为待出库');
                document.getElementById('scanInput').value = '';
                loadPendingList();
            };
        }
        
        async function loadPendingList() {
            const { data } = await supabase.from('tag_records').select('*').eq('status', '待出库').order('pending_time');
            const tbody = document.getElementById('pendingTableBody');
            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center">暂无待出库记录</td></td>';
                return;
            }
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td><input type="checkbox" class="pending-cb" data-id="${escapeHtml(item.tag_id)}"></td>
                    <td>${escapeHtml(item.tag_id)}</td>
                    <td>${escapeHtml(item.spec)}</td>
                    <td>${escapeHtml(item.color || '-')}</td>
                    <td>${escapeHtml(item.machine)}</td>
                    <td>${item.net} kg</td>
                    <td>${escapeHtml(item.handler || '-')}</td>
                    <td>${item.pending_time ? new Date(item.pending_time).toLocaleString() : '-'}</td>
                </tr>
            `).join('');
            
            const selectAll = document.getElementById('selectAllPending');
            if (selectAll) {
                selectAll.onclick = (e) => {
                    document.querySelectorAll('.pending-cb').forEach(cb => cb.checked = e.target.checked);
                };
            }
        }
        
        const batchOutBtn = document.getElementById('batchOutBtn');
        if (batchOutBtn) {
            batchOutBtn.onclick = async () => {
                const cbs = document.querySelectorAll('.pending-cb:checked');
                if (cbs.length === 0) { showToast('请勾选要出库的产品'); return; }
                if (!confirm(`确认出库 ${cbs.length} 个产品吗？`)) return;
                
                let success = 0;
                for (const cb of cbs) {
                    const tagId = cb.getAttribute('data-id');
                    const { data: tag } = await supabase.from('tag_records').select('*').eq('tag_id', tagId).single();
                    if (tag && tag.status === '待出库') {
                        await supabase.from('tag_records').update({ status: '已出库', out_time: new Date().toISOString() }).eq('tag_id', tagId);
                        await supabase.from('out_records').insert({
                            unique_id: tagId, spec: tag.spec, color_no: tag.color, machine_no: tag.machine,
                            quantity: tag.qty, net_weight: tag.net, batch_no: tag.batch, out_date: new Date().toLocaleString()
                        });
                        const { data: stock } = await supabase.from('stock_records').select('*')
                            .eq('spec', tag.spec).eq('color_no', tag.color || '').eq('machine_no', tag.machine).eq('batch_no', tag.batch || '');
                        if (stock && stock.length) {
                            await supabase.from('stock_records').update({ quantity: stock[0].quantity - tag.qty }).eq('id', stock[0].id);
                        }
                        success++;
                    }
                }
                showToast(`✅ 批量出库完成！成功: ${success}`);
                loadPendingList();
                loadStock();
                loadOutRecords();
            };
        }
        
        async function loadStock() {
            const { data } = await supabase.from('stock_records').select('*').order('spec');
            const search = document.getElementById('stockSearch')?.value.toLowerCase() || '';
            const filtered = (data || []).filter(i => i.spec.toLowerCase().includes(search) || (i.color_no || '').toLowerCase().includes(search) || (i.machine_no || '').toLowerCase().includes(search));
            const container = document.getElementById('stockList');
            if (!filtered.length) { container.innerHTML = '<p>暂无库存</p>'; return; }
            container.innerHTML = filtered.map(i => `
                <div class="stock-item">
                    <div><strong>${escapeHtml(i.spec)}</strong> ${i.color_no ? '| 色号:' + escapeHtml(i.color_no) : ''} ${i.machine_no ? '| 机号:' + escapeHtml(i.machine_no) : ''}</div>
                    <div>数量: ${i.quantity} | 净重: ${(i.net_weight||0).toFixed(2)}kg</div>
                </div>
            `).join('');
        }
        
        async function loadInRecords() {
            const { data } = await supabase.from('in_records').select('*').order('created_at', { ascending: false });
            const tbody = document.getElementById('inTableBody');
            tbody.innerHTML = (data || []).map(r => `
                <tr>
                    <td>${escapeHtml(r.unique_id||'-')}</td>
                    <td>${escapeHtml(r.spec||'-')}</td>
                    <td>${escapeHtml(r.color_no||'-')}</td>
                    <td>${escapeHtml(r.machine_no||'-')}</td>
                    <td>${r.quantity||'-'}</td>
                    <td>${r.net_weight?r.net_weight+'kg':'-'}</td>
                    <td>${escapeHtml(r.batch_no||'-')}</td>
                    <td>${r.in_date||'-'}</td>
                </tr>
            `).join('');
        }
        
        async function loadOutRecords() {
            const { data } = await supabase.from('out_records').select('*').order('created_at', { ascending: false });
            const tbody = document.getElementById('outTableBody');
            tbody.innerHTML = (data || []).map(r => `
                <tr>
                    <td>${escapeHtml(r.unique_id||'-')}</td>
                    <td>${escapeHtml(r.spec||'-')}</td>
                    <td>${escapeHtml(r.color_no||'-')}</td>
                    <td>${escapeHtml(r.machine_no||'-')}</td>
                    <td>${r.quantity||'-'}</td>
                    <td>${r.net_weight?r.net_weight+'kg':'-'}</td>
                    <td>${escapeHtml(r.batch_no||'-')}</td>
                    <td>${r.out_date||'-'}</td>
                </tr>
            `).join('');
        }
        
        const searchInBtn = document.getElementById('searchInBtn');
        if (searchInBtn) {
            searchInBtn.onclick = async () => {
                const kw = document.getElementById('inSearch').value.trim();
                if (!kw) { loadInRecords(); return; }
                const { data } = await supabase.from('in_records').select('*').or(`spec.ilike.%${kw}%,color_no.ilike.%${kw}%,machine_no.ilike.%${kw}%,batch_no.ilike.%${kw}%`);
                const tbody = document.getElementById('inTableBody');
                tbody.innerHTML = (data || []).map(r => `</table><td colspan="8">${escapeHtml(r.spec)}</td></tr>`).join('');
            };
        }
        
        const refreshInBtn = document.getElementById('refreshInBtn');
        if (refreshInBtn) refreshInBtn.onclick = loadInRecords;
        
        const searchOutBtn = document.getElementById('searchOutBtn');
        if (searchOutBtn) {
            searchOutBtn.onclick = async () => {
                const kw = document.getElementById('outSearch').value.trim();
                if (!kw) { loadOutRecords(); return; }
                const { data } = await supabase.from('out_records').select('*').or(`spec.ilike.%${kw}%,color_no.ilike.%${kw}%,machine_no.ilike.%${kw}%,batch_no.ilike.%${kw}%`);
                const tbody = document.getElementById('outTableBody');
                tbody.innerHTML = (data || []).map(r => `<tr><td colspan="8">${escapeHtml(r.spec)}</td></tr>`).join('');
            };
        }
        
        const refreshOutBtn = document.getElementById('refreshOutBtn');
        if (refreshOutBtn) refreshOutBtn.onclick = loadOutRecords;
        
        const refreshStockBtn = document.getElementById('refreshStockBtn');
        if (refreshStockBtn) refreshStockBtn.onclick = loadStock;
        
        const stockSearch = document.getElementById('stockSearch');
        if (stockSearch) stockSearch.addEventListener('input', loadStock);
        
        document.querySelectorAll('.sub-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                currentSubTab = tab.dataset.subtab;
                render();
            });
        });
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                currentTab = tab.dataset.tab;
                currentSubTab = 'current';
                render();
            });
        });
        
        loadStock();
        loadPendingList();
        loadInRecords();
        loadOutRecords();
    }
    
    render();
})();
</script>
</body>
</html>
